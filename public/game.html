<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quiz</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../src/css/game.css">
</head>

<body>

<div class="app-container">

    <div class="phone-card">

        <div class="progress-area">
            <div class="progress-bar-custom"></div>
            <div class="question-number">5</div>
        </div>

        <div class="question-box">
            Is this edible?
        </div>

        <div class="image-area">
            <img src="images/quiz1Image.jpg" class="quiz-img">
        </div>

        <div class="tf-buttons">
            <div class="tf-btn true-btn">T</div>
            <div class="tf-btn false-btn">F</div>
        </div>

        <div class="bottom-nav">
            <span class="material-icons nav-icon">menu_book</span>
            <span class="material-icons nav-icon">sports_esports</span>
            <span class="material-icons nav-icon">account_circle</span>
        </div>

    </div>

</div>

</body>
</html>
